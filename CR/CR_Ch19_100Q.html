<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRM P2 · CR . 19. QB</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF4E91; --orange: #FF6B35; --teal: #00C9A7;
  --blue: #5B8CFF; --yellow: #FFD700; --purple: #A259FF;
  --dark: #1a1a2e; --darker: #12121f; --card: #22223a;
  --text: #f0f0ff; --muted: #9090b8;
  --border: 3px solid #000; --shadow: 4px 4px 0px #000; --shadow-lg: 6px 6px 0px #000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--darker); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: radial-gradient(circle at 20% 20%, #FF4E9115 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, #5B8CFF15 0%, transparent 50%);
}

/* ── HEADER ── */
#header {
  background: var(--dark); border-bottom: var(--border);
  padding: 12px 20px; position: sticky; top: 0; z-index: 200;
  box-shadow: 0 4px 0 #000;
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
#header h1 { font-family:'Fredoka One',cursive; font-size:1.4rem; background:linear-gradient(135deg,var(--pink),var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { font-size:.7rem; color:var(--muted); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.scoreboard { display:flex; gap:8px; align-items:center; flex-shrink:0; }
.score-pill { background:var(--card); border:var(--border); box-shadow:var(--shadow); border-radius:20px; padding:4px 12px; font-weight:800; font-size:.82rem; }
.score-pill.correct { color:var(--teal); } .score-pill.wrong { color:var(--pink); } .score-pill.total { color:var(--yellow); }

/* ── CONTROLS BAR ── */
.controls-bar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
#search-input {
  width:100%; background:var(--darker); border:var(--border); border-radius:12px;
  padding:9px 14px 9px 38px; font-family:'Nunito',sans-serif; font-size:.9rem; font-weight:700;
  color:var(--text); outline:none; transition:border-color .15s, box-shadow .15s;
}
#search-input:focus { border-color:var(--blue); box-shadow:3px 3px 0 var(--blue); }
#search-input::placeholder { color:var(--muted); }

#topic-select {
  background:var(--darker); border:var(--border); border-radius:12px;
  padding:9px 14px; font-family:'Nunito',sans-serif; font-size:.88rem; font-weight:700;
  color:var(--text); outline:none; cursor:pointer; min-width:180px;
  transition:border-color .15s;
}
#topic-select:focus { border-color:var(--purple); }

#diff-select {
  background:var(--darker); border:var(--border); border-radius:12px;
  padding:9px 14px; font-family:'Nunito',sans-serif; font-size:.88rem; font-weight:700;
  color:var(--text); outline:none; cursor:pointer;
  transition:border-color .15s;
}

.clear-btn {
  background:var(--pink); border:var(--border); box-shadow:var(--shadow); border-radius:12px;
  padding:9px 16px; font-family:'Fredoka One',cursive; font-size:.85rem; color:#fff; cursor:pointer;
  white-space:nowrap; transition:transform .1s, box-shadow .1s;
}
.clear-btn:hover { transform:translate(-1px,-1px); box-shadow:5px 5px 0 #000; }

/* ── PROGRESS ── */
#progress-bar-wrap { width:100%; height:8px; background:var(--card); border-bottom:2px solid #000; }
#progress-bar { height:100%; background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow)); transition:width .4s; }

/* ── RESULTS COUNT ── */
#results-info { text-align:center; padding:14px 0 4px; font-family:'Fredoka One',cursive; font-size:.95rem; color:var(--muted); }

/* ── MAIN ── */
#app { max-width:860px; margin:0 auto; padding:10px 16px 80px; position:relative; z-index:1; }

/* ── QUESTION CARD ── */
.q-card {
  background:var(--card); border:var(--border); box-shadow:var(--shadow-lg);
  border-radius:18px; padding:22px 24px; margin-bottom:20px;
  animation: fadeUp .25s ease;
  scroll-margin-top: 200px;
}
.q-card.hidden { display:none; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.q-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
.badge { font-family:'Fredoka One',cursive; font-size:.68rem; padding:3px 10px; border-radius:20px; border:2px solid #000; box-shadow:2px 2px 0 #000; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
.badge-num { background:var(--purple); color:#fff; }
.badge-type { background:var(--blue); color:#fff; }
.badge-topic { background:var(--orange); color:#fff; font-size:.62rem; }
.badge-diff-medium { background:var(--yellow); color:#000; }
.badge-diff-hard { background:var(--pink); color:#fff; }
.badge-page { background:var(--teal); color:#000; font-size:.6rem; }

.q-text { font-size:1rem; font-weight:700; line-height:1.65; margin-bottom:16px; color:#fff; }

/* ── OPTIONS ── */
.options { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.opt-btn { background:var(--darker); border:var(--border); box-shadow:var(--shadow); border-radius:12px; padding:11px 16px; text-align:left; cursor:pointer; font-family:'Nunito',sans-serif; font-size:.9rem; font-weight:700; color:var(--text); transition:transform .12s, box-shadow .12s; display:flex; align-items:flex-start; gap:10px; }
.opt-btn:hover:not(:disabled) { transform:translate(-2px,-2px); box-shadow:6px 6px 0px #000; }
.opt-btn:disabled { cursor:default; }
.opt-btn .opt-letter { font-family:'Fredoka One',cursive; font-size:1rem; min-width:26px; height:26px; display:flex;align-items:center;justify-content:center; background:var(--card); border:2px solid #000; border-radius:7px; flex-shrink:0; }
.opt-btn.correct-ans { background:#00C9A730; border-color:var(--teal); box-shadow:4px 4px 0 var(--teal); }
.opt-btn.correct-ans .opt-letter { background:var(--teal); color:#000; }
.opt-btn.wrong-ans { background:#FF4E9130; border-color:var(--pink); box-shadow:4px 4px 0 var(--pink); }
.opt-btn.wrong-ans .opt-letter { background:var(--pink); color:#fff; }
.opt-btn.dimmed { opacity:.4; }
.opt-label { flex:1; line-height:1.5; }

/* ── TRUE/FALSE ── */
.tf-row { display:flex; gap:12px; margin-bottom:14px; }
.tf-btn { flex:1; padding:14px; border:var(--border); box-shadow:var(--shadow); border-radius:12px; font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; background:var(--darker); color:var(--text); transition:transform .12s, box-shadow .12s; }
.tf-btn:hover:not(:disabled) { transform:translate(-2px,-2px); box-shadow:6px 6px 0 #000; }
.tf-btn:disabled { cursor:default; }
.tf-btn.true-btn { border-color:var(--teal); } .tf-btn.false-btn { border-color:var(--pink); }
.tf-btn.correct-ans { background:#00C9A730; box-shadow:4px 4px 0 var(--teal); }
.tf-btn.wrong-ans { background:#FF4E9130; box-shadow:4px 4px 0 var(--pink); }

/* ── HINT ── */
.hint-btn { background:var(--yellow); border:var(--border); box-shadow:var(--shadow); border-radius:10px; padding:8px 16px; font-family:'Fredoka One',cursive; font-size:.88rem; color:#000; cursor:pointer; transition:transform .1s, box-shadow .1s; }
.hint-btn:hover { transform:translate(-1px,-1px); box-shadow:5px 5px 0 #000; }
.hint-box { background:#FFD70015; border:2px solid var(--yellow); border-radius:10px; padding:12px 16px; margin-top:10px; font-size:.87rem; font-weight:700; color:var(--yellow); display:none; }
.hint-box.show { display:block; }

/* ── EXPLANATION ── */
.explain-box { margin-top:14px; border-radius:12px; overflow:hidden; border:var(--border); box-shadow:var(--shadow); display:none; }
.explain-box.show { display:block; }
.explain-header { padding:10px 16px; font-family:'Fredoka One',cursive; font-size:.95rem; display:flex;align-items:center;gap:8px; }
.explain-header.correct-h { background:var(--teal); color:#000; }
.explain-header.wrong-h { background:var(--pink); color:#fff; }
.explain-body { background:#1a1a2e; padding:14px 16px; }
.explain-section { margin-bottom:10px; }
.explain-section:last-child { margin-bottom:0; }
.explain-label { font-family:'Fredoka One',cursive; font-size:.7rem; letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; display:flex;align-items:center;gap:5px; }
.explain-label.why { color:var(--blue); } .explain-label.trap { color:var(--orange); } .explain-label.ref { color:var(--purple); } .explain-label.options-label { color:var(--teal); }
.explain-text { font-size:.85rem; font-weight:600; line-height:1.6; color:#ddd; }
.opt-explain-item { margin-bottom:6px; padding:7px 11px; border-radius:7px; font-size:.83rem; font-weight:700; }
.opt-explain-item.oe-correct { background:#00C9A720; border-left:3px solid var(--teal); }
.opt-explain-item.oe-wrong { background:#FF4E9115; border-left:3px solid var(--pink); }

/* ── CARD BOTTOM BAR ── */
.card-bottom { display:flex; gap:10px; align-items:center; margin-top:8px; }
.answered-badge { font-family:'Fredoka One',cursive; font-size:.75rem; padding:4px 12px; border-radius:20px; border:2px solid #000; }
.answered-badge.ab-correct { background:var(--teal); color:#000; }
.answered-badge.ab-wrong { background:var(--pink); color:#fff; }

/* ── EMPTY STATE ── */
#empty-state { text-align:center; padding:60px 20px; display:none; }
#empty-state .e-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--muted); }
#empty-state .e-sub { color:var(--muted); margin-top:8px; }

/* ── STICKY STATS ── */
#sticky-stats {
  position:fixed; bottom:20px; right:20px; z-index:300;
  background:var(--dark); border:var(--border); box-shadow:var(--shadow-lg); border-radius:16px;
  padding:10px 16px; display:flex; gap:10px; align-items:center;
}
.stat-item { display:flex; flex-direction:column; align-items:center; }
.stat-num { font-family:'Fredoka One',cursive; font-size:1.3rem; line-height:1; }
.stat-label { font-size:.6rem; color:var(--muted); font-weight:700; text-transform:uppercase; }
.stat-num.c { color:var(--teal); } .stat-num.w { color:var(--pink); } .stat-num.t { color:var(--yellow); }
.stat-div { width:2px; height:30px; background:#333; }

.reset-all-btn { background:var(--purple); border:var(--border); box-shadow:var(--shadow); border-radius:10px; padding:6px 14px; font-family:'Fredoka One',cursive; font-size:.8rem; color:#fff; cursor:pointer; transition:transform .1s; }
.reset-all-btn:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 #000; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@media(max-width:600px){
  .controls-bar{flex-direction:column; align-items:stretch;}
  #topic-select,#diff-select{width:100%;}
  .q-card{padding:16px 12px;}
  #sticky-stats{bottom:10px;right:10px;padding:8px 12px;}
}
</style>
</head>
<body>
<div id="header">
  <div class="header-top">
    <div>
      <h1>📚 FRM Part 2 · Credit Risk Measurement and Management . Ch 19 . Future Value and Exposure</h1>
      <div class="subtitle">Future Value &amp; Exposure · 100 Questions</div>
    </div>
    <div class="scoreboard">
      <div class="score-pill correct">✅ <span id="sc">0</span></div>
      <div class="score-pill wrong">❌ <span id="sw">0</span></div>
      <div class="score-pill total">📊 <span id="sq">0</span>/100</div>
    </div>
  </div>
  <div class="controls-bar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search questions, topics, keywords..." oninput="applyFilters()">
    </div>
    <select id="topic-select" onchange="applyFilters()">
      <option value="">📂 All Topics</option>
    </select>
    <select id="diff-select" onchange="applyFilters()">
      <option value="">⚡ All Difficulties</option>
      <option value="medium">🟡 Medium</option>
      <option value="hard">🔴 Hard</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
  </div>
</div>
<div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

<div id="app">
  <div id="results-info">Showing all 100 questions</div>
  <div id="q-list"></div>
  <div id="empty-state">
    <div class="e-title">🔍 No matches found</div>
    <div class="e-sub">Try different search terms or clear filters</div>
  </div>
</div>

<div id="sticky-stats">
  <div class="stat-item"><div class="stat-num c" id="ss-c">0</div><div class="stat-label">Correct</div></div>
  <div class="stat-div"></div>
  <div class="stat-item"><div class="stat-num w" id="ss-w">0</div><div class="stat-label">Wrong</div></div>
  <div class="stat-div"></div>
  <div class="stat-item"><div class="stat-num t" id="ss-t">0</div><div class="stat-label">Done</div></div>
  <button class="reset-all-btn" onclick="resetAll()">🔁 Reset</button>
</div>

<script>
const QUESTIONS = [

// ── Q1: MCQ ──
{
  id:1, type:'mcq', difficulty:'medium',
  topic:'Positive/Negative Exposure', page:'p.274',
  text: 'Bank A holds a derivatives contract with counterparty X. The current net value of the contract (after netting and margin) is –$5M (negative from Bank A\'s perspective). Counterparty X then defaults. What is Bank A\'s credit exposure at default?',
  options:['–$5M, because the value is negative','$5M, because Bank A now claims this amount','$0, because Bank A owes money, not receives it','Determined by the recovery rate applied to $5M'],
  correct: 2,
  hint: 'Exposure = max(value, 0). Think about who loses when the value is negative.',
  explanation: 'When the net value is negative from Bank A\'s perspective, Bank A owes money to counterparty X. Even if X defaults, Bank A is still legally obligated to pay — it does NOT gain from X\'s default. Therefore positive exposure = max(–5, 0) = 0.',
  optionExplains: [
    'Wrong. Exposure is NOT negative. You can\'t claim a loss you owe.',
    'Wrong. $5M would be the exposure only if the value were +$5M (in Bank A\'s favor).',
    'CORRECT. Positive exposure = max(value, 0) = max(–5, 0) = 0. Bank A doesn\'t lose from the default.',
    'Wrong. Recovery rate applies to the claimant\'s positive exposure, not the party that owes.'
  ],
  trap: 'Students confuse the sign convention. Negative value = you owe them. You lose on positive value, not negative.'
},

// ── Q2: MCQ ──
{
  id:2, type:'mcq', difficulty:'hard',
  topic:'DVA / Negative Exposure', page:'p.275',
  text: 'Which xVA term is directly linked to the concept of "negative exposure" from an institution\'s own perspective?',
  options:['CVA (Credit Value Adjustment)','FVA (Funding Value Adjustment)','DVA (Debt Value Adjustment)','KVA (Capital Value Adjustment)'],
  correct: 2,
  hint: 'DVA relates to the institution\'s OWN default risk. What exposure is triggered when you default?',
  explanation: 'DVA represents "own counterparty risk" — the gain to an institution from the possibility of its own default. From the institution\'s perspective, a negative exposure (min(value,0)) would cause a loss to the counterparty if the institution defaults. DVA captures this.',
  optionExplains: [
    'Wrong. CVA is linked to positive exposure — the loss when the COUNTERPARTY defaults.',
    'Wrong. FVA relates to funding costs/benefits of uncollateralized positions.',
    'CORRECT. DVA = own default risk = negative exposure. If you owe money (negative value), your default harms them — this is DVA territory.',
    'Wrong. KVA relates to the cost of holding regulatory capital, not directly to negative exposure.'
  ],
  trap: 'Students mix CVA (counterparty defaults, positive exposure) with DVA (own default, negative exposure). The symmetry is the key.'
},

// ── Q3: True/False ──
{
  id:3, type:'truefalse', difficulty:'medium',
  topic:'Asymmetric Risk', page:'p.274',
  text: 'TRUE or FALSE: A party with a negative contract value generally gains from its counterparty\'s default, since the counterparty can no longer demand payment.',
  correct: false,
  hint: 'Even in default, legal obligations don\'t disappear for the surviving party.',
  explanation: 'FALSE. A party with a negative value is IN DEBT to the counterparty. Even if the counterparty defaults, the surviving party is still legally obligated to settle the amount owed. It does NOT gain — the position appears largely unchanged from a valuation perspective.',
  wrongPart: 'The statement implies debt obligations evaporate at counterparty default — they don\'t.',
  trap: 'Students think "default = relief." But legal close-out rules mean the in-debt party still must pay.'
},

// ── Q4: Formula Builder ──
{
  id:4, type:'mcq', difficulty:'medium',
  topic:'Exposure Formulas', page:'p.274',
  text: 'Which formula pair correctly defines BOTH positive exposure and negative exposure?',
  options:[
    'Positive = min(value,0); Negative = max(value,0)',
    'Positive = max(value,0); Negative = min(value,0)',
    'Positive = |value|; Negative = –|value|',
    'Positive = EFV; Negative = –EFV'
  ],
  correct: 1,
  hint: 'Positive exposure captures gains (loss risk). Negative exposure captures the mirror of that.',
  explanation: 'Eq 19.1: Positive exposure = max(value, 0). Eq 19.2: Negative exposure = min(value, 0). These are the foundational formulas of the chapter.',
  optionExplains: [
    'Wrong. Options A and B are SWAPPED. min(value,0) gives the negative part.',
    'CORRECT. Exactly Equations 19.1 and 19.2.',
    'Wrong. Absolute values destroy sign information — meaningless here.',
    'Wrong. EFV is the expected average, not the conditional positive/negative split.'
  ],
  trap: 'Swapping max and min is the most common error. Remember: POSITIVE exposure = max = floor at zero.'
},

// ── Q5: If-Then ──
{
  id:5, type:'mcq', difficulty:'medium',
  topic:'Exposure Asymmetry', page:'p.274–275',
  text: 'IF the net value of a derivatives portfolio (from Bank\'s perspective) increases significantly due to market moves, THEN which of the following effects on counterparty risk is MOST likely?',
  options:[
    'Counterparty risk decreases, since the bank now has less to lose',
    'Counterparty risk increases, since the bank now has more to lose if counterparty defaults',
    'Counterparty risk is unaffected — it depends only on the PD of the counterparty',
    'Counterparty risk increases only if a netting agreement is absent'
  ],
  correct: 1,
  hint: 'Higher positive value = larger claim at default. Think about what you lose if counterparty defaults NOW.',
  explanation: 'Counterparty risk (and CVA) is driven by positive exposure = max(value, 0). As value increases, positive exposure increases, meaning the bank stands to lose MORE if the counterparty defaults. Counterparty risk increases.',
  optionExplains: [
    'Wrong. Higher value = higher claim at default = MORE counterparty risk, not less.',
    'CORRECT. Positive exposure = max(value, 0) grows as value grows. Risk increases.',
    'Wrong. While PD matters for CVA, the exposure component also critically matters.',
    'Wrong. Netting affects aggregation, but even in a single-trade setup this logic holds.'
  ],
  trap: 'Students think "I\'m winning so I\'m safer." In counterparty risk, winning MORE means MORE to lose at default.'
},

// ── Q6: Spot the Error ──
{
  id:6, type:'mcq', difficulty:'medium',
  topic:'Definition of Value', page:'p.275',
  text: 'SPOT THE ERROR: "For xVA calculations, market practice is to use the actual close-out value of the contract, since the ISDA documentation ensures this is always objectively determined and equivalent to base value."',
  options:[
    'Error: market practice uses BASE value, not actual close-out value, because actual value creates a recursive problem',
    'Error: ISDA documentation is not used for xVA — Basel III dictates this',
    'Error: actual close-out value and base value are always identical in practice',
    'No error — this accurately describes market practice'
  ],
  correct: 0,
  hint: 'What does the text say about "actual value" containing xVA components?',
  explanation: 'The actual close-out value contains xVA components, creating a RECURSIVE problem (CVA depends on exposure, which depends on close-out value, which depends on CVA...). Market practice uses base value as a clean proxy. It is NOT always objectively determined.',
  optionExplains: [
    'CORRECT. Two errors in the statement: (1) market practice uses base value, (2) actual value is NOT objectively determined — it\'s subjective and creates recursion.',
    'Wrong. ISDA IS used, but it creates complexity, not clarity. Basel III isn\'t the issue here.',
    'Wrong. They are explicitly NOT identical — the difference is the whole point of section 19.1.2.',
    'Wrong. The statement contains a clear factual error about market practice.'
  ],
  trap: 'Students assume "documentation = objective." The recursive xVA problem is a subtle but key concept.'
},

// ── Q7: MCQ ──
{
  id:7, type:'mcq', difficulty:'medium',
  topic:'PFE vs VaR', page:'p.276–277',
  text: 'Potential Future Exposure (PFE) is analogous to which market risk measure, and at what horizon does traditional VaR operate?',
  options:[
    'VaR; 10-day horizon (traditional market risk)',
    'Expected Shortfall; 1-year horizon',
    'CVaR; 30-day horizon',
    'Stress VaR; multiple years'
  ],
  correct: 0,
  hint: 'The text explicitly calls PFE "an equivalent metric to VAR." What horizon does traditional market risk VaR use?',
  explanation: 'PFE is explicitly described as an equivalent metric to VaR (p.277). Traditional market risk capital models use a 10-day VaR horizon. However, PFE must extend to much longer horizons (years) due to the nature of derivatives.',
  optionExplains: [
    'CORRECT. PFE ≈ VaR; traditional VaR = 10-day horizon.',
    'Wrong. Expected Shortfall is a different measure (though EPE is analogous to ES, not PFE).',
    'Wrong. CVaR is another name for Expected Shortfall, not the PFE analog.',
    'Wrong. Stress VaR is a different regulatory concept.'
  ],
  trap: 'Students confuse EPE (similar to Expected Shortfall) with PFE (similar to VaR). They\'re different metrics.'
},

// ── Q8: MCQ (calculation) ──
{
  id:8, type:'mcq', difficulty:'hard',
  topic:'EPE/ENE Calculation', page:'p.278',
  text: 'Five equally-probable scenarios give future exposures of: +80, +40, +10, –20, –50. What is the EPE?',
  options:['26','13','12','16'],
  correct: 1,
  hint: 'EPE = average of all scenarios, but negatives are SET TO ZERO, then divide by total count (5).',
  explanation: 'EPE = (80 + 40 + 10 + 0 + 0) / 5 = 130/5 = 26. Wait — let me recheck: EPE = (max(80,0) + max(40,0) + max(10,0) + max(–20,0) + max(–50,0)) / 5 = (80+40+10+0+0)/5 = 130/5 = 26.',
  optionExplains: [
    'CORRECT. 26 = (80+40+10+0+0)/5.',
    'Wrong. 13 would be (80+40+10–20–50)/5 = 60/5 = 12 — that\'s EFV, not EPE.',
    'Wrong. 12 = EFV = (80+40+10–20–50)/5.',

// ── STATE ──
const state = {}; // keyed by question id: {answered, correct}
let score = {correct:0, wrong:0};

// ── INIT TOPIC DROPDOWN ──
function initTopics(){
  const topics = [...new Set(QUESTIONS.map(q=>q.topic))].sort();
  const sel = document.getElementById('topic-select');
  topics.forEach(t=>{
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

// ── RENDER ALL ──
function renderAll(){
  const list = document.getElementById('q-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q,idx)=>{
    const card = buildCard(q, idx+1);
    list.appendChild(card);
  });
  applyFilters();
}

function buildCard(q, displayNum){
  const div = document.createElement('div');
  div.className = 'q-card';
  div.id = 'card-'+q.id;
  div.setAttribute('data-topic', q.topic);
  div.setAttribute('data-diff', q.difficulty);
  div.setAttribute('data-text', (q.text + ' ' + q.topic + ' ' + (q.options||[]).join(' ')).toLowerCase());

  const diffClass = q.difficulty==='hard'?'badge-diff-hard':'badge-diff-medium';
  const typeLbl = {mcq:'Multiple Choice',truefalse:'True / False'}[q.type]||q.type;

  let html = `
    <div class="q-meta">
      <span class="badge badge-num">Q${displayNum}</span>
      <span class="badge badge-type">${typeLbl}</span>
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge ${diffClass}">${q.difficulty.toUpperCase()}</span>
      <span class="badge badge-page">${q.page}</span>
    </div>
    <div class="q-text">${q.text}</div>`;

  if(q.type==='mcq'){
    html += `<div class="options" id="opts-${q.id}">`;
    q.options.forEach((opt,i)=>{
      html += `<button class="opt-btn" onclick="answerMCQ(${q.id},${i})" id="opt-${q.id}-${i}">
        <span class="opt-letter">${['A','B','C','D'][i]}</span>
        <span class="opt-label">${opt}</span>
      </button>`;
    });
    html += `</div>`;
  } else if(q.type==='truefalse'){
    html += `<div class="tf-row">
      <button class="tf-btn true-btn" onclick="answerTF(${q.id},true)" id="tf-${q.id}-true">✅ TRUE</button>
      <button class="tf-btn false-btn" onclick="answerTF(${q.id},false)" id="tf-${q.id}-false">❌ FALSE</button>
    </div>`;
  }

  html += `
    <div class="hint-box" id="hint-${q.id}">💡 ${q.hint}</div>
    <div class="explain-box" id="exp-${q.id}"></div>
    <div class="card-bottom">
      <button class="hint-btn" id="hbtn-${q.id}" onclick="showHint(${q.id})">💡 Hint</button>
      <span id="abadge-${q.id}"></span>
    </div>`;

  div.innerHTML = html;
  return div;
}

// ── HINT ──
function showHint(id){
  if(state[id]) return;
  document.getElementById('hint-'+id).classList.add('show');
}

// ── ANSWER MCQ ──
function answerMCQ(id, chosen){
  if(state[id]) return;
  const q = QUESTIONS.find(x=>x.id===id);
  const isCorrect = chosen === q.correct;
  recordAnswer(id, isCorrect);

  for(let i=0;i<q.options.length;i++){
    const btn = document.getElementById(`opt-${id}-${i}`);
    if(!btn) continue;
    btn.disabled = true;
    if(i===q.correct) btn.classList.add('correct-ans');
    else if(i===chosen && !isCorrect) btn.classList.add('wrong-ans');
    else btn.classList.add('dimmed');
  }
  showExplanation(id, q, isCorrect);
  document.getElementById('hbtn-'+id).style.display='none';
}

// ── ANSWER TF ──
function answerTF(id, userAnswer){
  if(state[id]) return;
  const q = QUESTIONS.find(x=>x.id===id);
  const isCorrect = userAnswer === q.correct;
  recordAnswer(id, isCorrect);

  const tBtn = document.getElementById(`tf-${id}-true`);
  const fBtn = document.getElementById(`tf-${id}-false`);
  tBtn.disabled = true; fBtn.disabled = true;
  if(q.correct===true) tBtn.classList.add('correct-ans'); else tBtn.classList.add(userAnswer===true?'wrong-ans':'dimmed');
  if(q.correct===false) fBtn.classList.add('correct-ans'); else fBtn.classList.add(userAnswer===false?'wrong-ans':'dimmed');
  showExplanation(id, q, isCorrect);
  document.getElementById('hbtn-'+id).style.display='none';
}

// ── RECORD ──
function recordAnswer(id, isCorrect){
  state[id] = {answered:true, correct:isCorrect};
  if(isCorrect) score.correct++; else score.wrong++;
  updateScore();

  const badge = document.getElementById('abadge-'+id);
  if(badge){
    badge.className = `answered-badge ${isCorrect?'ab-correct':'ab-wrong'}`;
    badge.textContent = isCorrect ? '✅ Correct' : '❌ Wrong';
  }
}

// ── EXPLANATION ──
function showExplanation(id, q, isCorrect){
  const box = document.getElementById('exp-'+id);
  const hc = isCorrect?'correct-h':'wrong-h';
  const ht = isCorrect?'✅ Correct!':'❌ Not quite';
  let html = `<div class="explain-header ${hc}">${ht}</div><div class="explain-body">`;
  html += `<div class="explain-section"><div class="explain-label why">📖 Why This Is The Answer</div><div class="explain-text">${q.explanation}</div></div>`;

  if(q.optionExplains && q.type==='mcq'){
    html += `<div class="explain-section"><div class="explain-label options-label">🔍 Each Option Explained</div>`;
    q.optionExplains.forEach((exp,i)=>{
      const cl = i===q.correct?'oe-correct':'oe-wrong';
      html += `<div class="opt-explain-item ${cl}"><strong>${['A','B','C','D'][i]}:</strong> ${exp}</div>`;
    });
    html += `</div>`;
  }
  if(q.wrongPart && q.type==='truefalse'){
    html += `<div class="explain-section"><div class="explain-label options-label">🔍 The Wrong Part</div><div class="explain-text">${q.wrongPart}</div></div>`;
  }
  html += `<div class="explain-section"><div class="explain-label trap">⚠️ Common Trap</div><div class="explain-text">${q.trap}</div></div>`;
  html += `<div class="explain-section"><div class="explain-label ref">📚 ${q.page} — ${q.topic}</div></div>`;
  html += `</div>`;
  box.innerHTML = html;
  box.classList.add('show');
}

// ── SCORE ──
function updateScore(){
  const done = score.correct + score.wrong;
  document.getElementById('sc').textContent = score.correct;
  document.getElementById('sw').textContent = score.wrong;
  document.getElementById('sq').textContent = done;
  document.getElementById('ss-c').textContent = score.correct;
  document.getElementById('ss-w').textContent = score.wrong;
  document.getElementById('ss-t').textContent = done;
  document.getElementById('progress-bar').style.width = (done/100*100)+'%';
}

// ── FILTERS ──
function applyFilters(){
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const topic = document.getElementById('topic-select').value;
  const diff = document.getElementById('diff-select').value;
  const cards = document.querySelectorAll('.q-card');
  let visible = 0;

  cards.forEach(card=>{
    const cardTopic = card.getAttribute('data-topic');
    const cardDiff = card.getAttribute('data-diff');
    const cardText = card.getAttribute('data-text');

    const topicOk = !topic || cardTopic === topic;
    const diffOk = !diff || cardDiff === diff;
    const searchOk = !search || cardText.includes(search);

    if(topicOk && diffOk && searchOk){
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  const info = document.getElementById('results-info');
  const empty = document.getElementById('empty-state');
  if(visible===0){
    info.style.display='none';
    empty.style.display='block';
  } else {
    info.style.display='block';
    empty.style.display='none';
    const total = QUESTIONS.length;
    info.textContent = visible===total ? `Showing all ${total} questions` : `Showing ${visible} of ${total} questions`;
  }
}

function clearFilters(){
  document.getElementById('search-input').value='';
  document.getElementById('topic-select').value='';
  document.getElementById('diff-select').value='';
  applyFilters();
}

// ── RESET ALL ──
function resetAll(){
  if(!confirm('Reset all answers and scores?')) return;
  Object.keys(state).forEach(k=>delete state[k]);
  score = {correct:0, wrong:0};
  updateScore();
  renderAll();
}

// ── START ──
initTopics();
renderAll();
</script>
</body>
</html>
