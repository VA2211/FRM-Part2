const TOPICS = [

const TOPIC_COLORS = {
  'overview':'tc1','formula':'tc2','dva':'tc3','allocation':'tc4',
  'margin':'tc5','wwr':'tc6','models':'tc7'

// ─── QUESTION BANK ───────────────────────────────────────────────
const ALL_QS = [

// ══════════════════════════════════════════════════════════════
// TOPIC 1: CVA OVERVIEW (Q1-14)
// ══════════════════════════════════════════════════════════════
{
  id:1, topic:'overview', diff:'medium', format:'MCQ',
  q:'CVA was originally introduced as an adjustment to account for potential counterparty default. Under modern accounting standards such as IFRS 13, how must CVA be computed?',
  opts:['A. Using historical default probabilities to form an actuarial reserve','B. Using market-implied (risk-neutral) parameters to reflect an exit price','C. Using internal ratings-based default probabilities from Basel III','D. Using stress-tested parameters defined by the central bank'],
  ans:1,
  hint:'IFRS 13 demands a "fair value" / "exit price" concept.',
  why:'IFRS 13 requires derivatives to be reported at fair value using an exit price concept. This means CVA must use market-implied (risk-neutral) parameters — not historical estimates.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Historical default probabilities were used under the older actuarial reserve approach. IFRS 13 moved away from this.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> IFRS 13 / FAS 157 require market-implied parameters. CVA = exit price, not a reserve.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> IRB probabilities are for capital, not accounting CVA fair valuation.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Central bank stress tests are unrelated to the accounting standard for CVA.'},
  ],
  trap:'Many students confuse the old actuarial reserve approach with modern fair value CVA. The key trigger is IFRS 13 / FAS 157 = exit price = market-implied.',
  src:'§20.1, p.296'
},
{
  id:2, topic:'overview', diff:'medium', format:'True/False + Identify',
  q:'STATEMENT: "Because most counterparties do not have liquid single-name CDS referencing them, market-implied default probabilities cannot always be directly observed, but they are still required for CVA under accounting standards for most banks." Evaluate this statement.',
  opts:['A. True — proxy credit spread curves must be defined when direct CDS quotes are absent','B. False — banks can always use internal ratings-based default probabilities instead','C. True — but only for banks with derivatives books exceeding a regulatory threshold','D. False — IFRS 13 allows any reasonable estimate; historical PDs are equally acceptable'],
  ans:0,
  hint:'Think about what happens when a counterparty has no liquid CDS market.',
  why:'Most counterparties lack liquid single-name CDS. Banks must then construct proxy credit spread curves to derive market-implied PDs. The absence of a direct CDS market does not exempt them from the accounting requirement.',
  opts_why:[
    {cls:'good', txt:'<span class="g">A – Correct.</span> Proxy curves are used when direct CDS quotes are unavailable. Still market-implied.'},
    {cls:'bad', txt:'<span class="b">B – Wrong.</span> IRB PDs are for capital (Basel), not accounting CVA.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> No such threshold exists in IFRS 13 for which banks must comply.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Historical PDs are increasingly rare and only used by smaller regional banks arguing immateriality.'},
  ],
  trap:'Students often think that "no liquid CDS = use historical PD." The textbook explicitly states proxy curves fill the gap.',
  src:'§20.1, p.296'
},
{
  id:3, topic:'overview', diff:'medium', format:'If-Then',
  q:'If a bank is a small regional institution with an immaterial derivatives book and argues its exit price would be with a local competitor applying a similar approach, then it is MOST likely to:',
  opts:['A. Use market-implied credit spreads and risk-neutral CVA like large banks','B. Treat CVA as an actuarial reserve using historical default probabilities','C. Be required by Basel III to use FRTB-CVA methodology regardless','D. Compute BCVA including DVA using IFRS 13 market-implied parameters'],
  ans:1,
  hint:'Which approach is described as "increasingly rare" in the text?',
  why:'Small regional banks may argue the actuarial reserve approach is appropriate when they believe their exit price would be with a local competitor using the same method. This is explicitly described as increasingly rare but still permitted.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Large banks use market-implied approaches; this describes the general standard, not the small bank exception.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> The text explicitly names this as the exception case for smaller regional banks.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> FRTB-CVA is a capital framework, not an accounting requirement.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> If they use historical PDs, they are NOT applying IFRS 13 market-implied BCVA.'},
  ],
  trap:'The exception is narrow: it applies only to the actuarial reserve approach for very small banks. Most exam questions test the main rule.',
  src:'§20.1, p.296'
},
{
  id:4, topic:'overview', diff:'hard', format:'Spot the Error',
  q:'A candidate makes the following claim: "A key advantage of using risk-neutral exposure simulation for CVA is that it parallels bond pricing, and all necessary parameters — including correlations and long-dated volatilities — can be derived directly from market prices." Identify the error.',
  opts:['A. Risk-neutral exposure simulation is NOT analogous to bond pricing; it parallels option pricing','B. Correlations and long-dated volatilities cannot always be market-implied and may require assumptions','C. Risk-neutral CVA is only appropriate for accounting, not for pricing purposes','D. EPE, not exposure simulation, is the correct term for the CVA market-risk component'],
  ans:1,
  hint:'Which inputs to CVA are explicitly noted as not market-observable?',
  why:'The text states that "certain parameters cannot be market-implied since they are not observed in the market (e.g. correlations), or may require interpolation or extrapolation assumptions (e.g. long-dated volatilities)." The analogy is to option pricing (not bond pricing) but both A and B are partially correct — B is the primary error in the statement.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Partially right but not the main error.</span> The statement says "parallels bond pricing" which should be "option pricing" — but the more critical error is the claim about ALL parameters being market-observable.'},
    {cls:'good', txt:'<span class="g">B – Correct (primary error).</span> Correlations and long-dated volatilities are explicitly named as NOT always market-implied.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Risk-neutral CVA is appropriate for both pricing and accounting.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> EPE is correctly the market-risk component, but this is not the error in the statement.'},

  trap:'Students focus on the analogy (bond vs. option) and miss the more subtle error about parameter observability.',
  src:'§20.1, p.296'
},
{

  opts:['A. Derivatives have higher notional values, increasing potential losses','B. Derivatives involve bilateral cash flows, so only part of any given payment is at risk due to partial cancellation with opposing cash flows','C. Bond defaults can be hedged with CDS, while derivative defaults cannot be hedged at all','D. Derivatives mature faster than bonds, creating higher gamma risk'],
  ans:1,
  hint:'Think about what happens to a specific cash flow in a swap vs. a bond when default occurs.',

  opts_why:[

// ─── STATE ───────────────────────────────────────────────────
let state = {
  currentQ: 0,
  activeTopic: 'all',
  answers: {}, // id → selected option index or null
  hintShown: {}, // id → bool
  filteredQs: [],
};

function getFiltered() {
  if (state.activeTopic === 'all') return ALL_QS;
  return ALL_QS.filter(q => q.topic === state.activeTopic);
}

function getStats() {
  let correct = 0, wrong = 0, done = 0;
  ALL_QS.forEach(q => {
    if (state.answers[q.id] !== undefined) {
      done++;
      if (state.answers[q.id] === q.ans) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, done };
}

function updateScoreboard() {
  const { correct, wrong, done } = getStats();
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-done').textContent = done;
  const pct = done > 0 ? Math.round((correct / done) * 100) + '%' : '—';
  document.getElementById('sc-pct').textContent = pct;
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLabel');
  if (pf) pf.style.width = (done / ALL_QS.length * 100) + '%';
  if (pl) pl.textContent = done + ' / ' + ALL_QS.length + ' answered';
}

// ─── RENDER ──────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  wrap.innerHTML = TOPICS.map(t => `
    <button class="tab-btn ${t.cls} ${state.activeTopic === t.id ? 'active' : ''}"
      onclick="setTopic('${t.id}')">${t.label}</button>
  `).join('');
}

function renderAll() {
  renderTabs();
  updateScoreboard();
  renderCurrentQ();
}

function renderCurrentQ() {
  state.filteredQs = getFiltered();
  const total = state.filteredQs.length;
  if (state.currentQ >= total) state.currentQ = Math.max(0, total - 1);

  const qArea = document.getElementById('qArea');
  const rs = document.getElementById('resultScreen');

  if (state.currentQ >= total && total === 0) {
    qArea.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No questions for this topic.</p>';
    document.getElementById('navCounter').textContent = '0 / 0';
    return;
  }

  rs.classList.remove('show');
  qArea.style.display = '';

  const q = state.filteredQs[state.currentQ];
  if (!q) return;

  const answered = state.answers[q.id] !== undefined;
  const selectedIdx = state.answers[q.id];
  const hintShown = state.hintShown[q.id];
  const topicColor = TOPIC_COLORS[q.topic] || 'tc1';
  const diffCls = q.diff === 'hard' ? 'diff-hard' : 'diff-medium';

  const optLetters = ['A','B','C','D'];

  let optsHtml = q.opts.map((opt, idx) => {
    let cls = '';
    if (answered) {
      if (idx === q.ans) cls = 'correct-ans';
      else if (idx === selectedIdx) cls = 'wrong-ans';
    }
    return `
      <button class="opt-btn ${cls}" 
        onclick="selectAnswer(${q.id}, ${idx})"
        ${answered ? 'disabled' : ''}>
        <span class="opt-letter">${optLetters[idx]}</span>
        <span>${opt.replace(/^[A-D]\. /, '')}</span>
      </button>`;
  }).join('');

  let hintHtml = '';
  if (!answered) {
    hintHtml = `
      <button class="hint-btn" onclick="showHint(${q.id})">💡 Hint</button>
      <div class="hint-box ${hintShown ? 'show' : ''}" id="hint-${q.id}">${q.hint}</div>
    `;
  }

  let expHtml = '';
  if (answered) {
    const isCorrect = selectedIdx === q.ans;
    const optsWhy = q.opts_why.map((ow, i) =>
      `<div class="opt-analysis ${ow.cls}">${optLetters[i]}. ${ow.txt}</div>`
    ).join('');
    expHtml = `
      <div class="explanation-box show">
        <div class="exp-header">${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</div>
        <div class="exp-answer">Correct Answer: ${optLetters[q.ans]}</div>
        <div class="exp-why">${q.why}</div>
        <div style="margin-bottom:10px">${optsWhy}</div>
        <div class="trap-box">${q.trap}</div>
        <div class="source-tag">📖 Source: ${q.src}</div>
      </div>`;
  }

  qArea.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="q-topic-badge ${topicColor}">${TOPICS.find(t=>t.id===q.topic)?.label.split(' ').slice(1).join(' ') || q.topic}</span>
        <span class="q-format-badge">${q.format}</span>
        <span class="q-diff-badge ${diffCls}">${q.diff.toUpperCase()}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-grid">${optsHtml}</div>
      ${hintHtml}
      ${expHtml}
    </div>`;

  const nc = document.getElementById('navCounter');
  if (nc) nc.textContent = `${state.currentQ + 1} / ${total}`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────
function selectAnswer(qId, idx) {
  if (state.answers[qId] !== undefined) return;
  state.answers[qId] = idx;
  updateScoreboard();
  renderCurrentQ();
}

function showHint(qId) {
  state.hintShown[qId] = true;
  const el = document.getElementById('hint-' + qId);
  if (el) el.classList.add('show');
}

function navigate(dir) {
  state.filteredQs = getFiltered();
  state.currentQ = Math.max(0, Math.min(state.filteredQs.length - 1, state.currentQ + dir));
  renderCurrentQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setTopic(topicId) {
  state.activeTopic = topicId;
  state.currentQ = 0;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.answers = {};
  state.hintShown = {};
  state.currentQ = 0;
  state.activeTopic = 'all';
  document.getElementById('resultScreen').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── INIT ─────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
