.opt-btn.correct-ans { border-color: var(--teal) !important; background: rgba(0,201,167,0.15) !important; box-shadow: 3px 3px 0 var(--teal) !important; }

.opt-btn.wrong-ans { border-color: var(--pink) !important; background: rgba(255,78,145,0.12) !important; box-shadow: 3px 3px 0 var(--pink) !important; }

.hint-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #000; }

.exp-answer { font-size: 0.88rem; font-weight: 800; color: var(--teal); margin-bottom: 10px; }
.exp-why { font-size: 0.85rem; font-weight: 600; line-height: 1.6; color: var(--text); margin-bottom: 10px; }

.opt-analysis.bad { background: rgba(255,78,145,0.08); border-color: var(--pink); color: #ccc; }

.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: var(--border); padding: 12px 20px; display: flex; gap: 10px; justify-content: center; align-items: center; z-index: 200; }
.nav-btn { font-family: 'Fredoka One', cursive; font-size: 0.9rem; padding: 10px 24px; border-radius: 999px; border: 2.5px solid #000; cursor: pointer; box-shadow: 3px 3px 0 #000; transition: transform 0.1s, box-shadow 0.1s; }
.nav-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #000; }
.nav-btn.prev { background: var(--card2); color: var(--muted); }
.nav-btn.next { background: var(--teal); color: #000; }
.nav-btn.reset { background: var(--pink); color: #000; }
.nav-counter { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--yellow); min-width: 80px; text-align: center; }

.result-screen { display: none; max-width: 560px; margin: 60px auto; text-align: center; padding: 0 20px; }
.result-screen.show { display: block; }
.result-card { background: var(--card); border: var(--border); border-radius: 24px; box-shadow: var(--shadow); padding: 40px 30px; }
.result-score { font-family: 'Fredoka One', cursive; font-size: 4rem; color: var(--yellow); text-shadow: 4px 4px 0 #000; }
.result-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 20px; }
.result-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
.rst { font-family: 'Fredoka One', cursive; font-size: 1.3rem; }
.rst.c { color: var(--teal); }
.rst.w { color: var(--pink); }
.restart-btn { background: var(--orange); border: 3px solid #000; border-radius: 999px; padding: 14px 36px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #000; cursor: pointer; box-shadow: 5px 5px 0 #000; transition: transform 0.1s; }
.restart-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #000; }

.tc1 { background: var(--teal); }
.tc2 { background: var(--blue); }
.tc3 { background: var(--orange); }

}

<script>
const TOPICS = [
  { id: 'all',        label: '📚 All Topics',            cls: 't0' },
  { id: 'evolution',  label: '🔍 CCR Evolution',          cls: 't1' },
  { id: 'measures',   label: '📐 Exposure Measures',      cls: 't2' },

  { id: 'cva_stress', label: '📉 Stress CVA & DVA',       cls: 't5' },
  { id: 'pitfalls',   label: '⚠️ Pitfalls',               cls: 't6' },
  { id: 'formulas',   label: '🧮 Formulas & Calc',        cls: 't7' },
];

const TOPIC_COLORS = {
  'evolution':'tc1','measures':'tc2','stress_ce':'tc3','loan_eq':'tc4',
  'cva_stress':'tc5','pitfalls':'tc6','formulas':'tc7'
};

const ALL_QS = [

// ══════════════════════════════════════════════════════
// TOPIC 1: CCR EVOLUTION (Q1–14)
// ══════════════════════════════════════════════════════
{
  id:1, topic:'evolution', diff:'medium', format:'MCQ',
  q:'In the 1990s, regulatory capital for CCR under BCBS 1988 was primarily determined by:',
  opts:['A. EPE models feeding into portfolio credit risk frameworks','B. Add-ons to current exposure measures expressed as a percentage of gross notional','C. CVA charges calculated under market-implied credit spreads','D. Bilateral netting agreements reducing total potential exposure'],
  ans:1,
  hint:'Think about the BCBS 1988 regime — what simple metric drove capital?',
  why:'Under BCBS 1988, regulatory capital for CCR was calculated as add-ons to current exposure, which were a fixed percentage of gross notional of derivative transactions with a counterparty. This was a crude measure that did not incorporate future exposure dynamics.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> EPE-based portfolio credit risk models came later, after 2000.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> BCBS 1988 = add-ons to current exposure as % of gross notional.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> CVA charges came with Basel III (BCBS 2011), not BCBS 1988.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Netting agreements were incorporated into CCR modelling later, not the 1988 framework.'},
  ],
  trap:'The 1988 Basel Accord predates all the sophisticated exposure modelling. Its approach was purely notional-based add-ons.',
  src:'§21.1, p.324'
},
{
  id:2, topic:'evolution', diff:'medium', format:'True/False + Identify',
  q:'STATEMENT: "The stress testing of CCR has evolved just as rapidly as the statistical measures of CCR, keeping pace with advances in EPE and CVA modelling." Evaluate this statement.',
  opts:['A. True — stress testing has advanced alongside EPE and CVA models since the 1990s','B. False — statistical measures have progressed more rapidly than stress testing of CCR','C. True — Basel II mandated simultaneous advances in both statistical measures and stress tests','D. False — stress testing of CCR actually advanced before the statistical measures did'],
  ans:1,
  hint:'The chapter\'s opening premise explicitly addresses this gap.',
  why:'The text directly states: "statistical measures have progressed more rapidly than stress testing." Despite calls from regulators and industry since 1999, stress testing of CCR has not kept pace with the rapid evolution of statistical measures like EPE and CVA.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> This is precisely what the text refutes. Stress testing has lagged behind.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> The chapter\'s thesis: statistical measures outpaced stress testing of CCR.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Basel II focused on capital treatment of CCR, not stress testing parity.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Stress testing did not precede statistical measure development.'},
  ],
  trap:'Students assume "advanced risk modelling" implies advanced stress testing too. The text explicitly says no.',
  src:'§21.1 introduction, p.323-324'
},
{
  id:3, topic:'evolution', diff:'medium', format:'MCQ',
  q:'Potential exposure models were developed first, and then adapted into EPE models that allowed derivatives to be placed in portfolio credit risk models similarly to loans. This development occurred as part of treating CCR as:',
  opts:['A. A market risk — via CVA modelling for derivatives pricing','B. A credit risk — the predominant framework from 2000 to 2006','C. An operational risk — for stress scenarios at the enterprise level','D. A liquidity risk — managing collateral funding under netting agreements'],
  ans:1,
  hint:'Which risk framework was dominant for CCR from 2000 to 2006?',
  why:'Treating CCR as a credit risk was the predominant framework from 2000 to 2006. Potential exposure models → EPE models allowed derivatives to be placed in portfolio credit risk models like loans. This was established as the basis for Basel II regulatory capital (BCBS 2005).',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> CVA modelling is the market risk treatment, which was developing but "largely relegated to pricing" before the crisis.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Credit risk treatment dominated 2000–2006, culminating in Basel II.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> CCR is not classified as an operational risk.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Liquidity risk is distinct; netting reduces exposure but doesn\'t define the risk framework.'},
  ],
  trap:'Don\'t confuse the two CCR frameworks. Credit risk = EPE-based, loan-like. Market risk = CVA-based, P&L-sensitive.',
  src:'§21.1, p.324'
},
{
  id:4, topic:'evolution', diff:'hard', format:'Spot the Error',
  q:'A candidate writes: "Wrong-way risk is unusual in CCR because it only occurs in derivatives, not loans, since loan exposure is stochastic and correlated with default probability." Identify the error.',
  opts:['A. Wrong-way risk can occur in loans as well as derivatives','B. The error is describing loan exposure as stochastic — loan exposure is fixed, which is precisely why wrong-way risk does not occur for loans','C. Wrong-way risk is not unique to CCR; it also applies to market risk portfolios','D. The definition of wrong-way risk is wrong — it refers to collateral, not exposure'],
  ans:1,
  hint:'What is the defining feature of loan exposure that makes wrong-way risk inapplicable?',
  why:'The text states: "When exposure is fixed, as is the case for a loan, this does not occur, so adaptation of techniques used in other areas of risk management is more difficult." The candidate\'s error is calling loan exposure stochastic — it is fixed. The fixed nature of loan exposure is precisely why wrong-way risk doesn\'t arise in loans.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Wrong-way risk is specifically a CCR/derivatives problem. Fixed loan exposure eliminates it.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Loan exposure is FIXED, not stochastic. That\'s the whole reason wrong-way risk is a CCR-specific problem.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Wrong-way risk IS unusual to CCR; it is not a general market risk concept.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Wrong-way risk is the correlation of counterparty credit quality with exposure, not collateral.'},
  ],
  trap:'The key distinction: fixed loan exposure vs. stochastic derivative exposure. This makes wrong-way risk a unique CCR challenge.',
  src:'§21.1, p.324'
},
{
  id:5, topic:'evolution', diff:'medium', format:'If-Then',
  q:'If a bank treats CCR exclusively as a credit risk (PFE limits, netting, collateral management), then it is MOST LIKELY to be blind to:',
  opts:['A. Sudden default of a high-quality counterparty','B. Changes in CVA as credit spreads and derivative values fluctuate, causing balance-sheet surprises','C. The impact of netting agreements on reducing exposure','D. The need to calculate EPE for placing derivatives in portfolio credit models'],
  ans:1,
  hint:'What does the credit risk view miss that the market risk view captures?',
  why:'If CCR is treated only as a credit risk, the bank can still be exposed to changes in CVA. Financial institutions managing PFE limits may still face balance-sheet surprises when CVA moves due to changes in credit spreads and market values. This is the "blind spot" of the pure credit risk view.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Sudden default IS the core concern of the credit risk view — that\'s precisely what it monitors.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> CVA changes are a market risk. Pure credit risk treatment leaves the bank exposed to P&L volatility from spread movements.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Netting is part of the credit risk management toolkit, not a blind spot.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> EPE is part of the credit risk framework; it\'s not a blind spot.'},
  ],
  trap:'The credit risk view manages default risk well but is blind to the mark-to-market volatility of CVA — a key insight from the 2007-08 crisis.',
  src:'§21.1, p.325'
},
{
  id:6, topic:'evolution', diff:'hard', format:'GMAT Weaken',
  q:'A risk manager argues: "Under the market risk view of CCR, by the time a counterparty defaults, the financial institution has already hedged its exposure by replacing trades proportionally, so the default event itself becomes a non-event." Which of the following most WEAKENS this argument?',
  opts:['A. The market risk view does not allow for CVA hedging in practice','B. The financial institution remains exposed to large sudden drops in creditworthiness or sudden default, since replacing trades dynamically assumes gradual deterioration','C. The credit risk view is superior because it focuses on PFE limits','D. CVA hedging is prohibited under Basel III rules for smaller banks'],
  ans:1,
  hint:'What happens if the counterparty\'s credit quality collapses suddenly without warning?',
  why:'The text notes: "If CCR is treated as a market risk, dynamically hedging its CVA to limit its market risk losses, it remains exposed to large drops in creditworthiness or the sudden default of one of its counterparties." Dynamic hedging via gradual trade replacement works for gradual deterioration, but a sudden gap default means the financial institution hasn\'t had time to replace trades adequately.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> CVA hedging IS practiced under the market risk view; this is factually incorrect.'},
    {cls:'good', txt:'<span class="g">B – Correct (Weakener).</span> Dynamic replacement assumes gradual deterioration. Sudden default or gap jump defeats this strategy.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> PFE limits don\'t address the weakness of dynamic hedging; this doesn\'t weaken the argument.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> No such Basel III prohibition exists and this is irrelevant to the argument\'s logic.'},
  ],
  trap:'Dynamic CVA hedging works on the assumption of gradual credit deterioration. The gap risk of sudden default is the key vulnerability.',
  src:'§21.1, p.325'
},
{
  id:7, topic:'evolution', diff:'medium', format:'MCQ',
  q:'Under the credit risk view of CCR, what happens at the moment a counterparty defaults?',
  opts:['A. The bank\'s CVA hedge unwinds automatically through the CDS market','B. The financial institution must replace the defaulting counterparty\'s trades all at once in the market to rebalance its book','C. The bilateral netting agreement triggers an automatic collateral call that fully covers the exposure','D. Expected positive exposure (EPE) becomes the legal basis for claims in bankruptcy proceedings'],
  ans:1,
  hint:'What is the key operational action required at counterparty default under the credit risk framework?',
  why:'Under the credit risk view, the traditional approach is to manage risk at inception or through collateral. "At default, the financial institution must replace the trades of the defaulting counterparty in the market all at once in order to rebalance its book." This is in contrast to the market risk view, where trades are replaced progressively before default.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> CDS hedge unwinds are part of the market risk / CVA hedging approach, not the credit risk view.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Credit risk view = replace all defaulted counterparty trades simultaneously at the point of default.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Collateral calls help but don\'t fully cover exposure in all cases; this is not the defining action.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> EPE is a statistical measure, not a legal instrument in bankruptcy.'},
  ],
  trap:'Credit risk view = big bang replacement at default. Market risk view = gradual pre-replacement proportional to PD.',
  src:'§21.1, p.325'
},

// ─── STATE ───────────────────────────────────────────────────
let state = {
  currentQ: 0,
  activeTopic: 'all',
  answers: {},
  hintShown: {},
  filteredQs: [],
};

function getFiltered() {
  if (state.activeTopic === 'all') return ALL_QS;
  return ALL_QS.filter(q => q.topic === state.activeTopic);
}

function getStats() {
  let correct = 0, wrong = 0, done = 0;
  ALL_QS.forEach(q => {
    if (state.answers[q.id] !== undefined) {
      done++;
      if (state.answers[q.id] === q.ans) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, done };
}

function updateScoreboard() {
  const { correct, wrong, done } = getStats();
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-done').textContent = done;
  const pct = done > 0 ? Math.round((correct / done) * 100) + '%' : '—';
  document.getElementById('sc-pct').textContent = pct;
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLabel');
  if (pf) pf.style.width = (done / ALL_QS.length * 100) + '%';
  if (pl) pl.textContent = done + ' / ' + ALL_QS.length + ' answered';
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  wrap.innerHTML = TOPICS.map(t => `
    <button class="tab-btn ${t.cls} ${state.activeTopic === t.id ? 'active' : ''}"
      onclick="setTopic('${t.id}')">${t.label}</button>
  `).join('');
}

function renderAll() {
  renderTabs();
  updateScoreboard();
  renderCurrentQ();
}

function renderCurrentQ() {
  state.filteredQs = getFiltered();
  const total = state.filteredQs.length;
  if (state.currentQ >= total) state.currentQ = Math.max(0, total - 1);

  const qArea = document.getElementById('qArea');
  const rs = document.getElementById('resultScreen');

  if (total === 0) {
    qArea.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No questions for this topic.</p>';
    document.getElementById('navCounter').textContent = '0 / 0';
    return;
  }

  rs.classList.remove('show');
  qArea.style.display = '';

  const q = state.filteredQs[state.currentQ];
  if (!q) return;

  const answered = state.answers[q.id] !== undefined;
  const selectedIdx = state.answers[q.id];
  const hintShown = state.hintShown[q.id];
  const topicColor = TOPIC_COLORS[q.topic] || 'tc1';
  const diffCls = q.diff === 'hard' ? 'diff-hard' : 'diff-medium';
  const optLetters = ['A','B','C','D'];

  let optsHtml = q.opts.map((opt, idx) => {
    let cls = '';
    if (answered) {
      if (idx === q.ans) cls = 'correct-ans';
      else if (idx === selectedIdx) cls = 'wrong-ans';
    }
    return `
      <button class="opt-btn ${cls}"
        onclick="selectAnswer(${q.id}, ${idx})"
        ${answered ? 'disabled' : ''}>
        <span class="opt-letter">${optLetters[idx]}</span>
        <span>${opt.replace(/^[A-D]\. /, '')}</span>
      </button>`;
  }).join('');

  let hintHtml = '';
  if (!answered) {
    hintHtml = `
      <button class="hint-btn" onclick="showHint(${q.id})">💡 Hint</button>
      <div class="hint-box ${hintShown ? 'show' : ''}" id="hint-${q.id}">${q.hint}</div>
    `;
  }

  let expHtml = '';
  if (answered) {
    const isCorrect = selectedIdx === q.ans;
    const optsWhy = q.opts_why.map((ow, i) =>
      `<div class="opt-analysis ${ow.cls}">${optLetters[i]}. ${ow.txt}</div>`
    ).join('');
    expHtml = `
      <div class="explanation-box show">
        <div class="exp-header">${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</div>
        <div class="exp-answer">Correct Answer: ${optLetters[q.ans]}</div>
        <div class="exp-why">${q.why}</div>
        <div style="margin-bottom:10px">${optsWhy}</div>
        <div class="trap-box">${q.trap}</div>
        <div class="source-tag">📖 Source: ${q.src}</div>
      </div>`;
  }

  qArea.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="q-topic-badge ${topicColor}">${TOPICS.find(t=>t.id===q.topic)?.label.split(' ').slice(1).join(' ') || q.topic}</span>
        <span class="q-format-badge">${q.format}</span>
        <span class="q-diff-badge ${diffCls}">${q.diff.toUpperCase()}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-grid">${optsHtml}</div>
      ${hintHtml}
      ${expHtml}
    </div>`;

  const nc = document.getElementById('navCounter');
  if (nc) nc.textContent = `${state.currentQ + 1} / ${total}`;
}

function selectAnswer(qId, idx) {
  if (state.answers[qId] !== undefined) return;
  state.answers[qId] = idx;
  updateScoreboard();
  renderCurrentQ();
}

function showHint(qId) {
  state.hintShown[qId] = true;
  const el = document.getElementById('hint-' + qId);
  if (el) el.classList.add('show');
}

function navigate(dir) {
  state.filteredQs = getFiltered();
  state.currentQ = Math.max(0, Math.min(state.filteredQs.length - 1, state.currentQ + dir));
  renderCurrentQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setTopic(topicId) {
  state.activeTopic = topicId;
  state.currentQ = 0;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.answers = {};
  state.hintShown = {};
  state.currentQ = 0;
  state.activeTopic = 'all';
  document.getElementById('resultScreen').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
