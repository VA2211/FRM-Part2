{
  id:1, topic:'concept', diff:'easy', format:'Match the Pairs',
  q:'Match each term to its correct description: (i) Securitisation (ii) SPV (iii) ABS (iv) MBS',
  opts:['A. (i) sale of assets to a separate entity that issues notes backed by those assets; (ii) the separate legal entity that holds the assets; (iii) debt instrument backed by non-mortgage loans; (iv) debt instrument backed by mortgage loans','B. (i) insurance policy on a collateral pool; (ii) the originating bank; (iii) residential mortgage pass-through; (iv) any pooled loan product','C. (i) conversion of illiquid assets to liquid bonds; (ii) rating agency; (iii) senior tranche; (iv) equity tranche','D. (i) issuance of covered bonds; (ii) bankruptcy-remote issuer; (iii) commercial mortgage; (iv) consumer loan'],
  ans:0,
  hint:'Securitisation\'s core act is "true sale" — assets leave the originator\'s balance sheet. MBS = mortgage-backed; ABS = all other.',
  why:'Securitisation refers to the sale of assets to a specially created entity (the SPV/SPE) which funds itself by issuing notes backed by those assets. The SPV is the distinct legal entity holding the transferred assets. ABS are debt instruments created from non-mortgage loan pools; MBS are backed specifically by mortgage loans.',
  opts_why:[
    {cls:'good', txt:'<span class="g">A – Correct.</span> All four definitions precisely match the chapter\'s own definitions.'},
    {cls:'bad', txt:'<span class="b">B – Wrong.</span> Insurance policy = pool insurance (a credit enhancement), not the definition of securitisation. The originating bank is not the SPV.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Confuses securitisation\'s purpose with its definition. Rating agencies and tranches are participants/features, not what these terms mean.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Covered bonds are a distinct product — they do NOT involve true sale. This conflates two different products.'},
  ],
  trap:'MBS = only mortgages. Every other securitised loan pool = ABS. Mortgages are the one exception carved out from the ABS category.',
  src:'§23.1, pp.360'
},
{
  id:2, topic:'concept', diff:'easy', format:'MCQ',
  q:'Which of the following BEST describes the concept of "bankruptcy-remote" as applied to an SPV?',
  opts:['A. The SPV files for bankruptcy protection ahead of any credit event in the collateral pool','B. If the originator (sponsor) goes bankrupt, the assets held by the SPV and the notes it has issued are not affected','C. Investors in SPV notes have full recourse to the originator in the event of collateral pool losses','D. The SPV must hold liquid reserves equal to 100% of its outstanding notes at all times'],
  ans:1,
  hint:'Bankruptcy-remote goes ONE WAY only — the originator\'s problems do not contaminate the SPV.',
  why:'An SPV is a legal trust or company not linked to the originator for legal purposes. It is bankruptcy-remote from the sponsor: if the sponsor suffers financial difficulty or is declared bankrupt, this has no impact on the SPV or the notes it has issued. Crucially, the converse also applies — if collateral deteriorates, investors have no recourse to the originator.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> The SPV does not pre-emptively file for bankruptcy. The whole point is that it is insulated FROM bankruptcy proceedings.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Originator bankruptcy → no impact on SPV assets or SPV-issued notes. This is the textbook definition.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> The opposite is true. Investors have NO recourse to the originator if collateral deteriorates.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Liquidity reserves are a different concept (credit enhancement). Bankruptcy-remoteness is a legal structural feature.'},

  trap:'Bankruptcy-remoteness is a two-way shield: originator problems don\'t hit the SPV, AND collateral problems don\'t let investors sue the originator.',

  ans:2,
  hint:'The text explicitly states "The key issue is taxation." Basel capital relief is a benefit of securitisation generally, not the reason for offshore domicile.',
  why:'The text states SPVs are frequently incorporated in offshore centres such as Jersey or Cayman Islands. However, the primary reason given is TAXATION — the sponsor wishes all cash flows to attract low or no tax, including withholding tax on coupons. Basel capital relief is an important benefit of securitisation generally, but is not cited as the reason for offshore SPV domicile.',
  opts_why:[

    {cls:'good', txt:'<span class="g">C – Correct.</span> The primary reason is taxation. The text says explicitly: "The key issue is taxation."'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Offshore incorporation is explicitly true — the text names Jersey, Cayman Islands, Dublin, Netherlands.'},
  ],
  trap:'Tax treatment drives offshore domicile choice. Capital relief drives the decision to SECURITISE at all — these are different decisions with different motivations.',
  src:'§23.1, p.361'

  ans:1,
  hint:'The text contrasts these two legal forms but notes both are used for the same ultimate purpose.',
  why:'For legal purposes an SPV is categorised as either a Company or a Trust. The Trust form is more common in the US, with interests represented by a Trustee (e.g., Deutsche Bank Agency Services, Citibank, or Wilmington Trust). In the Euromarkets, SPVs are often incorporated as companies. Both forms serve the same purpose as bankruptcy-remote holders of securitised assets.',

  hint:'The entire point of bankruptcy-remoteness is that the SPV is legally separate. The originator\'s insolvency cannot penetrate that barrier.',

    {cls:'bad', txt:'<span class="b">D – Wrong.</span> The SPV continues to operate normally. Notes are not automatically redeemed.'},

  trap:'Originator bankruptcy → SPV continues. Collateral deterioration → investors bear losses. These are two independent risk dimensions.',

  src:'§23.3, p.364'

{
  id:47, topic:'enhance', diff:'medium', format:'MCQ',
  q:'What is "excess spread" in a securitisation, and what happens to any monthly surplus?',
  opts:['A. The difference between the senior and junior note coupon rates; surplus goes to the originator immediately','B. The difference between the return on underlying assets and the interest payable on issued notes; surplus is held in a reserve account (or returned to the originator if not needed for losses)','C. The collateral pool\'s yield minus LIBOR; held as a regulatory capital buffer','D. The excess note issuance above the collateral value; returned to investors at maturity'],
  ans:1,
  hint:'The text gives a precise definition. Where does the monthly surplus go first?',
  why:'The text states: "Excess spread: this is the difference between the return on the underlying assets and the interest rate payable on the issued notes (liabilities). The monthly excess spread is used to cover expenses and any losses. If any surplus is left over, it is held in a reserve account to cover against future losses or (if not required for that), as a benefit to the originator."',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Excess spread is not the difference between senior and junior note coupons. Surplus does not go immediately to the originator — it first fills the reserve account.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Asset return minus liability interest = excess spread. Surplus → reserve account → then originator if not needed.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Excess spread is not defined as yield minus LIBOR, and it is not a capital buffer.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Excess note issuance above collateral value would be undercollateralisation — the opposite of what excess spread means.'},
  ],
  trap:'Excess spread flows: (1) cover expenses and losses first; (2) surplus → reserve account; (3) if reserve is full → originator. The reserve account IS a credit enhancement for investors while it\'s funded.',
  src:'§23.3, p.365'
},

// ─── STATE ────────────────────────────────────────────
const state = {
  answers: {},
  hintShown: {},
  currentQ: 0,
  activeTopic: 'all',
  filteredQs: [],
};

function getFiltered() {
  return state.activeTopic === 'all'
    ? ALL_QS
    : ALL_QS.filter(q => q.topic === state.activeTopic);
}

function getStats() {
  let correct = 0, wrong = 0, done = 0;
  ALL_QS.forEach(q => {
    if (state.answers[q.id] !== undefined) {
      done++;
      if (state.answers[q.id] === q.ans) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, done };
}

function updateScoreboard() {
  const { correct, wrong, done } = getStats();
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-done').textContent = done;
  const pct = done > 0 ? Math.round((correct / done) * 100) + '%' : '—';
  document.getElementById('sc-pct').textContent = pct;
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLabel');
  if (pf) pf.style.width = (done / ALL_QS.length * 100) + '%';
  if (pl) pl.textContent = done + ' / ' + ALL_QS.length + ' answered';
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  wrap.innerHTML = TOPICS.map(t => `
    <button class="tab-btn ${t.cls} ${state.activeTopic === t.id ? 'active' : ''}"
      onclick="setTopic('${t.id}')">${t.label}</button>
  `).join('');
}

function renderAll() {
  renderTabs();
  updateScoreboard();
  renderCurrentQ();
}

function renderCurrentQ() {
  state.filteredQs = getFiltered();
  const total = state.filteredQs.length;
  if (state.currentQ >= total) state.currentQ = Math.max(0, total - 1);

  const qArea = document.getElementById('qArea');
  const rs = document.getElementById('resultScreen');

  if (total === 0) {
    qArea.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No questions for this topic.</p>';
    document.getElementById('navCounter').textContent = '0 / 0';
    return;
  }

  rs.classList.remove('show');
  qArea.style.display = '';

  const q = state.filteredQs[state.currentQ];
  if (!q) return;

  const answered = state.answers[q.id] !== undefined;
  const selectedIdx = state.answers[q.id];
  const hintShown = state.hintShown[q.id];
  const topicColor = TOPIC_COLORS[q.topic] || 'tc1';
  const diffCls = q.diff === 'hard' ? 'diff-hard' : q.diff === 'easy' ? 'diff-easy' : 'diff-medium';
  const optLetters = ['A','B','C','D'];

  let optsHtml = q.opts.map((opt, idx) => {
    let cls = '';
    if (answered) {
      if (idx === q.ans) cls = 'correct-ans';
      else if (idx === selectedIdx) cls = 'wrong-ans';
    }
    return `
      <button class="opt-btn ${cls}"
        onclick="selectAnswer(${q.id}, ${idx})"
        ${answered ? 'disabled' : ''}>
        <span class="opt-letter">${optLetters[idx]}</span>
        <span>${opt.replace(/^[A-D]\. /, '')}</span>
      </button>`;
  }).join('');

  let hintHtml = '';
  if (!answered) {
    hintHtml = `
      <button class="hint-btn" onclick="showHint(${q.id})">💡 Hint</button>
      <div class="hint-box ${hintShown ? 'show' : ''}" id="hint-${q.id}">${q.hint}</div>
    `;
  }

  let expHtml = '';
  if (answered) {
    const isCorrect = selectedIdx === q.ans;
    const optsWhy = q.opts_why.map((ow, i) =>
      `<div class="opt-analysis ${ow.cls}">${optLetters[i]}. ${ow.txt}</div>`
    ).join('');
    expHtml = `
      <div class="explanation-box show">
        <div class="exp-header">${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</div>
        <div class="exp-answer">Correct Answer: ${optLetters[q.ans]}</div>
        <div class="exp-why">${q.why}</div>
        <div style="margin-bottom:10px">${optsWhy}</div>
        <div class="trap-box">${q.trap}</div>
        <div class="source-tag">📖 Source: ${q.src}</div>
      </div>`;
  }

  qArea.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="q-topic-badge ${topicColor}">${TOPICS.find(t=>t.id===q.topic)?.label.split(' ').slice(1).join(' ') || q.topic}</span>
        <span class="q-format-badge">${q.format}</span>
        <span class="q-diff-badge ${diffCls}">${q.diff.toUpperCase()}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-grid">${optsHtml}</div>
      ${hintHtml}
      ${expHtml}
    </div>`;

  const nc = document.getElementById('navCounter');
  if (nc) nc.textContent = `${state.currentQ + 1} / ${total}`;
}

function selectAnswer(qId, idx) {
  if (state.answers[qId] !== undefined) return;
  state.answers[qId] = idx;
  updateScoreboard();
  renderCurrentQ();
}

function showHint(qId) {
  state.hintShown[qId] = true;
  const el = document.getElementById('hint-' + qId);
  if (el) el.classList.add('show');
}

function navigate(dir) {
  state.filteredQs = getFiltered();
  state.currentQ = Math.max(0, Math.min(state.filteredQs.length - 1, state.currentQ + dir));
  renderCurrentQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setTopic(topicId) {
  state.activeTopic = topicId;
  state.currentQ = 0;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.answers = {};
  state.hintShown = {};
  state.currentQ = 0;
  state.activeTopic = 'all';
  document.getElementById('resultScreen').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
